<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jonathan Varghese Moncy</title>
<script>
  // GitHub Pages 404 clean URL redirect
  // Maps /contact -> #contact, /experience -> #experience etc
  var slugs = ['home','about','experience','skills','certifications','projects','contact'];
  var path = window.location.pathname;
  var segments = path.split('/').filter(Boolean);
  var last = segments[segments.length - 1] || '';
  // Check if last segment is a known page slug
  var page = slugs.indexOf(last) >= 0 ? last : 'home';
  sessionStorage.setItem('redirect_page', page);
  // Redirect to root of the site
  var origin = window.location.origin;
  var repoPath = '';
  // Detect GitHub Pages repo subpath e.g. /JonathanVargheseMoncyPortfolio.com/
  if(segments.length > 1 && slugs.indexOf(segments[0]) < 0){
    repoPath = '/' + segments[0];
  }
  window.location.replace(origin + repoPath + '/');
</script>
</head>
<body></body>
</html>
